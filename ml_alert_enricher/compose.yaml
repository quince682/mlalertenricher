services:
  python-fastapi_app:
    build:
      context: ./fastapi_app
      dockerfile: Dockerfile
    container_name: python-fastapi_app
    restart: unless-stopped
    init: true
    ports:
      - "8000:8000"  # Expose FastAPI app on port 8000
    # env_file: ./fastapi_app/.env  # Uncomment if .env file exists
    working_dir: /app
    volumes:
      - ./data:/app/data  # Persist SQLite database and logs
    environment:
      - DATABASE_PATH=/app/data/mappings.db

